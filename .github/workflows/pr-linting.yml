name: PR Linting

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-linting

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typescript
        run: npm run typecheck

      - name: Svelte
        run: npm run check