name: PR Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-tests


permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hmpg
          POSTGRES_PASSWORD: hmpg
          POSTGRES_DB: hmpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Set test DATABASE_URL
        run: echo "DATABASE_URL=postgresql://hmpg:hmpg@localhost:5432/hmpg" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Migrations
        run: npm run db:migrate

      - name: Test
        run: npm run test:coverage

      - name: Post coverage comment
        if: success()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
